<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ของขวัญพิเศษ</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#ffb6c1,#ffc0cb);
      font-family:sans-serif;
    }

    .card{
      background:white;
      padding:30px;
      border-radius:20px;
      text-align:center;
      width:350px;
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
    }

    h1{
      color:#ff4081;
    }

    button{
      margin-top:15px;
      padding:12px 25px;
      border:none;
      border-radius:12px;
      background:#ff4081;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      background:#e91e63;
      transform:scale(1.05);
    }

    #gift{
      display:none;
      margin-top:20px;
      animation:fade 1s;
    }

    #gift img{
      width:100%;
      border-radius:15px;
    }

    #text{
      margin-top:15px;
      font-size:22px;
      color:#444;
    }

    @keyframes fade{
      from{
        opacity:0;
        transform:translateY(10px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h3> วันครบรอบเดือนแรกของเรา </h3>

    <button id="okBtn" onclick="showGift()">OK</button>

    <div id="gift">
      <img src="Screenshot 2026-06-04 184503.png" alt=>

      <div id="text">
        เค้ารักขวัญที่สุดเลยคับ 💖
      </div>
    </div>
  </div>

  <audio id="bgMusic" src="Download.mp3" loop></audio>

  <script>
    function showGift(){
      // 1. แสดงรูปภาพและข้อความ
      document.getElementById("gift").style.display = "block";
      
      // 2. ซ่อนปุ่ม OK เพื่อความสวยงามและคลีน
      document.getElementById("okBtn").style.display = "none";
      
      // 3. สั่งให้เพลงเล่น
      var audio = document.getElementById("bgMusic");
      audio.play().catch(function(error) {
         console.log("เบราว์เซอร์บล็อกการเล่นเสียงอัตโนมัติ: ", error);
      });
    }
  </script>

</body>
</html>
